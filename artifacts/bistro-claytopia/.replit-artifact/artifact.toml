kind = "web"
previewPath = "/"
title = "Bistro Claytopia"
version = "1.0.0"
id = "artifacts/bistro-claytopia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23318

[services.development]
run = "pnpm --filter @workspace/bistro-claytopia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bistro-claytopia", "run", "build" ]
publicDir = "artifacts/bistro-claytopia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23318"
BASE_PATH = "/"
